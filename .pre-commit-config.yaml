repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
      # 1) Auto-format with Ruff (handles import sorting via I rules + code formatting)
      - id: ruff-format
        name: Formatter (ruff)
        args:
          - --config=pyproject.toml

      # 2) Lint with Ruff (includes import sorting check via I rules)
      - id: ruff
        name: Linter (ruff)
        args:
          - --fix
          - --config=pyproject.toml

  - repo: local
    hooks:
      - id: ty
        name: Type checker (ty)
        entry: uv run ty check src/ --exclude src/tests/** --exclude src/app/research/**
        language: system
        pass_filenames: false
        types: [python]

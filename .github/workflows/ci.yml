name: CI

on:
  pull_request:
    branches: [main, dev]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Python 3.14
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --dev

      - name: Ruff format check
        run: uv run ruff format --check --config=pyproject.toml .

      - name: Ruff lint
        run: uv run ruff check --config=pyproject.toml .

      - name: Pyright
        run: uv run pyright --project=pyproject.toml

      - name: isort check
        run: uv run isort --check-only --sp=pyproject.toml .

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Python 3.14
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests
        run: uv run pytest src/tests/ -v

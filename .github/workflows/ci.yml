name: CI

on:
  pull_request:
    branches: [main, dev]

env:
  UV_HTTP_TIMEOUT: 300

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --dev

      - name: Ruff format check
        run: uv run ruff format --check --config=pyproject.toml .

      - name: Ruff lint (includes import sorting)
        run: uv run ruff check --config=pyproject.toml .

      - name: Pyright
        run: uv run pyright --project=pyproject.toml

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests
        run: uv run pytest src/tests/ -v

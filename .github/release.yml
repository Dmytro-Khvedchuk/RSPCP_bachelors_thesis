changelog:
  categories:
    - title: New Features
      labels:
        - feature
        - enhancement
    - title: Bug Fixes
      labels:
        - bug
    - title: Tests
      labels:
        - test
    - title: Research
      labels:
        - research
    - title: Documentation
      labels:
        - documentation
    - title: Other Changes
      labels:
        - "*"
  exclude:
    labels:
      - duplicate
      - invalid
      - wontfix
      - ignore-for-release
